<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Visualizer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg,#667eea,#764ba2);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Arial, sans-serif;
    }

    .card{
        width:850px;
        border:none;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .title{
        text-align:center;
        font-size:2rem;
        font-weight:bold;
        color:#4a4a4a;
    }

    .number-box{
        width:80px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
    }

    .btn-custom{
        width:180px;
        font-weight:bold;
        border-radius:30px;
    }

    #result{
        margin-top:20px;
        padding:15px;
        border-radius:10px;
        font-size:20px;
        font-weight:bold;
        text-align:center;
    }

    .array-container{
        display:flex;
        justify-content:center;
        gap:10px;
        flex-wrap:wrap;
    }
</style>
</head>
<body>

<div class="card p-4">
    <h1 class="title"> Search Algorithm Visualizer</h1>
    <hr>

    <h5 class="text-center mb-3">Enter 5 Numbers</h5>

    <div class="array-container">
        <input type="number" class="form-control number-box" id="n1">
        <input type="number" class="form-control number-box" id="n2">
        <input type="number" class="form-control number-box" id="n3">
        <input type="number" class="form-control number-box" id="n4">
        <input type="number" class="form-control number-box" id="n5">
    </div>

    <div class="mt-4">
        <label class="form-label fw-bold">Target Number</label>
        <input type="number" id="target" class="form-control">
    </div>

    <div class="text-center mt-4">
        <button class="btn btn-success btn-custom me-3" onclick="linearSearch()">
            Linear Search
        </button>

        <button class="btn btn-warning btn-custom" onclick="binarySearch()">
            Binary Search
        </button>
    </div>

    <div id="result"></div>
</div>

<script>
function getArray() {
    return [
        parseInt(document.getElementById("n1").value),
        parseInt(document.getElementById("n2").value),
        parseInt(document.getElementById("n3").value),
        parseInt(document.getElementById("n4").value),
        parseInt(document.getElementById("n5").value)
    ];
}

function linearSearch() {
    let arr = getArray();
    let target = parseInt(document.getElementById("target").value);

    let index = -1;

    for(let i=0;i<arr.length;i++){
        if(arr[i]===target){
            index=i;
            break;
        }
    }

    let result=document.getElementById("result");

    if(index!==-1){
        result.className="alert alert-success";
        result.innerHTML= Linear Search: Element found at Index <b>${index}</b>`;
    }
    else{
        result.className="alert alert-danger";
        result.innerHTML=Linear Search: Element not found`;
    }
}

function binarySearch() {
    let arr = getArray().sort((a,b)=>a-b);
    let target = parseInt(document.getElementById("target").value);

    let left=0;
    let right=arr.length-1;
    let index=-1;

    while(left<=right){
        let mid=Math.floor((left+right)/2);

        if(arr[mid]===target){
            index=mid;
            break;
        }
        else if(arr[mid]<target){
            left=mid+1;
        }
        else{
            right=mid-1;
        }
    }

    let result=document.getElementById("result");

    if(index!==-1){
        result.className="alert alert-info";
        result.innerHTML=
         Binary Search: Element found at Index <b>${index}</b><br>
         Sorted Array: [ ${arr.join(" , ")} ]`;
    }
    else{
        result.className="alert alert-danger";
        result.innerHTML= Binary Search: Element not found`;
    }
}
</script>

</body>
</html>
