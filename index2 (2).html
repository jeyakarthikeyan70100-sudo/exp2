<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interpolation Search Visualizer</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c6ff,#7b2ff7);
background-size:400% 400%;
animation:bg 10s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* Floating circles */

.circle{

position:absolute;
border-radius:50%;
background:rgba(255,255,255,.15);
animation:float 8s linear infinite;

}

.circle:nth-child(1){

width:150px;
height:150px;
top:10%;
left:5%;

}

.circle:nth-child(2){

width:250px;
height:250px;
bottom:-60px;
right:5%;

animation-duration:10s;

}

.circle:nth-child(3){

width:100px;
height:100px;
top:60%;
left:15%;

animation-duration:6s;

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0);}

}

/* Glass Card */

.card{

width:650px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:40px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

color:white;

animation:zoom .8s;

}

@keyframes zoom{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.title{

font-size:35px;
font-weight:700;

text-align:center;

margin-bottom:25px;

text-shadow:0 0 15px cyan;

}

.form-control{

border-radius:12px;

padding:14px;

font-size:17px;

border:none;

}

.form-control:focus{

box-shadow:0 0 15px cyan;

}

.btn-search{

width:100%;

padding:15px;

font-size:20px;

font-weight:bold;

border:none;

border-radius:12px;

background:linear-gradient(45deg,#ff512f,#dd2476);

color:white;

transition:.4s;

}

.btn-search:hover{

transform:scale(1.05);

box-shadow:0 0 25px hotpink;

}

.array-container{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:12px;

margin-top:30px;

}

.box{

width:65px;

height:65px;

background:linear-gradient(45deg,#00dbde,#fc00ff);

display:flex;

justify-content:center;

align-items:center;

border-radius:15px;

font-size:22px;

font-weight:bold;

color:white;

transition:.4s;

box-shadow:0 0 15px rgba(255,255,255,.4);

}

.active{

background:orange;

transform:scale(1.2);

box-shadow:0 0 25px yellow;

}

.found{

background:#00ff6a;

animation:pulse .6s infinite alternate;

}

@keyframes pulse{

from{transform:scale(1);}
to{transform:scale(1.18);}

}

#result{

margin-top:25px;

font-size:23px;

font-weight:bold;

text-align:center;

}

.footer{

margin-top:20px;

text-align:center;

color:#eee;

font-size:14px;

}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="card">

<div class="title">

<i class="bi bi-search"></i>

Interpolation Search Visualizer

</div>

<div class="mb-3">

<label class="form-label fw-bold">
Sorted Numbers
</label>

<input
id="array"
class="form-control"
placeholder="10 20 30 40 50 60">

</div>

<div class="mb-3">

<label class="form-label fw-bold">
Search Element
</label>

<input
id="key"
type="number"
class="form-control"
placeholder="40">

</div>

<button
class="btn-search"
onclick="interpolationSearch()">

<i class="bi bi-lightning-charge-fill"></i>

Search Element

</button>

<div id="visualArray" class="array-container"></div>

<div id="result"></div>

<div class="footer">

Made with ❤️ HTML • CSS • Bootstrap • JavaScript

</div>

</div>

<script>

async function interpolationSearch(){

let arr=document.getElementById("array").value
.trim()
.split(" ")
.map(Number);

let key=parseInt(document.getElementById("key").value);

let visual=document.getElementById("visualArray");

visual.innerHTML="";

arr.forEach(num=>{

let div=document.createElement("div");

div.className="box";

div.innerHTML=num;

visual.appendChild(div);

});

let boxes=document.querySelectorAll(".box");

let low=0;

let high=arr.length-1;

while(low<=high && key>=arr[low] && key<=arr[high]){

if(arr[high]==arr[low]) break;

let pos=low+Math.floor(
((high-low)*(key-arr[low]))/
(arr[high]-arr[low])
);

boxes.forEach(b=>b.classList.remove("active"));

boxes[pos].classList.add("active");

await new Promise(r=>setTimeout(r,800));

if(arr[pos]==key){

boxes[pos].classList.remove("active");

boxes[pos].classList.add("found");

document.getElementById("result").innerHTML=
"<div class='alert alert-success mt-3'><h4>🎉 Element Found at Index "+pos+"</h4></div>";

return;

}

if(arr[pos]<key)

low=pos+1;

else

high=pos-1;

}

document.getElementById("result").innerHTML=
"<div class='alert alert-danger mt-3'><h4>❌ Element Not Found</h4></div>";

}

</script>

</body>
</html>
